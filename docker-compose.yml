name: msghub

services:
  db: # БАЗА ДАННЫХ
    image: postgres:15 # Какой образ БД использовать
    container_name: msghub_db
    environment: # Переменные окружения
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes: # Постоянное хранилище
      - postgres_data:/var/lib/postgresql/data
    networks:
      - msghub_network 
    healthcheck: # Проверка работоспособности БД
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"] # Команда для проверки работоспособности БД
      interval: 10s # Интервал между проверками
      timeout: 5s # Таймаут проверки
      retries: 5 # Количество попыток
      start_period: 10s # Задержка перед первой проверкой
    restart: unless-stopped # Перезапуск контейнера при сбое

  redis: # Redis
    image: redis:7-alpine
    command: ["sh", "-c", "redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
    container_name: msghub_redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - msghub_network
    healthcheck: # Проверка работоспособности Redis
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping"] # Команда для проверки работоспособности Redis
      interval: 10s # Интервал между проверками
      timeout: 5s # Таймаут проверки
      retries: 5 # Количество попыток
      start_period: 5s # Задержка перед первой проверкой
    restart: unless-stopped
    volumes:
      - redis_data:/data # Объем для хранения данных Redis
  
  backend: # Бэкенд
    build: # Будем собирать образ из DockerFile
      context: . # Контекст сборки (корневая директория проекта)
      dockerfile: Dockerfile
    container_name: msghub_backend
    env_file:
      - .env
    expose: # Порты будут доступны только внутри контейнера
      - "8000"
    depends_on:
      db: # Зависимость от БД
        condition: service_healthy # Проверка работоспособности БД
      redis: # Зависимость от Redis
        condition: service_healthy # Проверка работоспособности Redis
    networks: # Сеть для контейнера
      - msghub_network
    restart: unless-stopped # Перезапуск контейнера при сбое
  
  # Фронт внутри образа: после git pull пересоберите nginx (не только backend).
  # Пример принудительной пересборки слоя Vite: CACHEBUST=$(date +%s) docker compose build nginx --no-cache
  # или bash scripts/rebuild-nginx.sh
  nginx: # Nginx + встроенная сборка фронта (см. Dockerfile.nginx)
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        CACHEBUST: ${CACHEBUST:-1}
        GIT_REVISION: ${GIT_REVISION:-unknown}
    image: msghub-nginx:latest
    container_name: msghub_nginx
    ports:
      - "80:80"
      # TODO: раскомментировать порт при отправке на ВМ: - "443:443"
    volumes:
      - ./nginx.conf/nginx.conf:/etc/nginx/nginx.conf:ro
      # - ./infrastructure/nginx/certs:/etc/nginx/certs:ro # Сертификаты
    depends_on:
      backend:
        condition: service_started # Проверка работоспособности бэкенда
    networks:
      - msghub_network
    restart: unless-stopped
  
  # frontend: # Фронтенд
  #   build: 
  #     context: ./app/frontend
  #     dockerfile: Dockerfile
  #   container_name: msghub_frontend
  #   ports:
  #     - "3000:80"
  #   depends_on:
  #     - backend
  #   networks:
  #     - msghub_network
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks: 
  msghub_network: 
    driver: bridge # Сеть для контейнера